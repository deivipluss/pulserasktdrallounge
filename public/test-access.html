<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Test</title>
</head>
<body>
  <h1>Testing CSV Access</h1>
  <div id="result">Loading...</div>

  <script>
    async function checkCSVAccess() {
      const result = document.getElementById('result');
      try {
        const response = await fetch('/tokens/2025-08-12.csv');
        if (response.ok) {
          const text = await response.text();
          result.innerHTML = `<p>Success! CSV file loaded.</p>
                            <p>Content preview:</p>
                            <pre>${text.slice(0, 500)}...</pre>`;
        } else {
          result.textContent = `Error: ${response.status} ${response.statusText}`;
        }
      } catch (error) {
        result.textContent = `Error: ${error}`;
      }
    }
    checkCSVAccess();
  </script>
</body>
</html>
